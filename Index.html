    <style>
        /* CSS VARIABLES FOR EASY SHADE CUSTOMIZATION */
        :root {
            --bg-color: #0b0f17;      /* Deep Obsidian Blue */
            --card-bg: #131c2e;       /* Slate Blue */
            --text-main: #f3f4f6;     /* Off-White */
            --text-muted: #9ca3af;    /* Muted Gray */
            --accent: #6366f1;        /* Electric Indigo */
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        /* Header Layout */
        .header {
            margin-bottom: 40px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .logo-gta {
            height: 35px;
            width: auto;
            object-fit: contain;
        }

        .logo-media {
            height: 100px;
            width: auto;
            object-fit: contain;
            opacity: 0.7;
        }

        .accent-line {
            width: 32px;
            height: 3px;
            background: var(--accent);
            margin: 0 auto 20px auto;
            border-radius: 2px;
        }

        .meta-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            line-height: 1.5;
        }

        /* Grid Setup (2 Columns on Mobile, 3 Columns on Desktop) */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 30px;
        }

        @media (min-width: 480px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Minimalist Button Styling */
        .btn-part {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Micro-interaction Arrow Indicator */
        .btn-part::after {
            content: '→';
            font-size: 1rem;
            color: var(--text-muted);
            transition: all 0.2s ease;
            opacity: 0.5;
        }

        /* Hover States */
        .btn-part:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25);
        }

        .btn-part:hover::after {
            color: #ffffff;
            opacity: 1;
            transform: translateX(2px);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.5;
        }
    </style>
